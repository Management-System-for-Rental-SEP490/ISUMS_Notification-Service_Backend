name: CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ dev, test ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: Management-System-for-Rental-SEP490/.github/.github/workflows/ci-java-service.yml@main
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
